name: Nightly Email Queue Builder

on:
  schedule:
    - cron: '0 14 * * *'  # 9:00 AM ET daily
  workflow_dispatch:       # Allow manual trigger

jobs:
  build-email-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright openpyxl google-auth google-auth-httplib2 google-api-python-client
          playwright install chromium --with-deps

      - name: Run Radius scraper
        env:
          RADIUS_USERNAME: ${{ secrets.RADIUS_USERNAME }}
          RADIUS_PASSWORD: ${{ secrets.RADIUS_PASSWORD }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          python scraper/scraper.py

      - name: Upload downloaded files for inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-downloads
          path: scraper/downloads/
          retention-days: 7

      - name: Upload debug screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: scraper/debug/
          retention-days: 3
