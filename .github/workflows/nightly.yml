name: Nightly Email Queue Builder

on:
  schedule:
    # Runs at 6:00 AM ET (11:00 UTC) every day
    - cron: '0 11 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  build-email-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd scraper
          npm install

      - name: Install Playwright browsers
        run: |
          cd scraper
          npx playwright install chromium --with-deps

      - name: Run Radius scraper
        env:
          RADIUS_EMAIL: ${{ secrets.RADIUS_EMAIL }}
          RADIUS_PASSWORD: ${{ secrets.RADIUS_PASSWORD }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          cd scraper
          node scraper.js

      - name: Upload artifacts on failure (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: scraper/debug/
          retention-days: 3

