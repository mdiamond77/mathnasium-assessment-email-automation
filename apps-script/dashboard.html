<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathnasium — Email Review Queue</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --red: #E8352A; --red-light: #fff1f0; --red-dark: #b52820;
    --ink: #1a1a1a; --ink-mid: #4a4a4a; --ink-soft: #888;
    --cream: #fdfaf6; --white: #fff; --border: #e8e2d9;
    --success: #1a9e6e; --success-light: #edfaf5;
    --warning: #b57c10; --warning-light: #fdf4e7;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }

  header {
    background: var(--white); border-bottom: 1px solid var(--border);
    padding: 0 32px; display: flex; align-items: center; justify-content: space-between;
    height: 60px; position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 9px; font-family: 'DM Serif Display', serif; font-size: 1.1rem; }
  .logo-icon { width: 30px; height: 30px; background: var(--red); border-radius: 7px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 0.8rem; font-family: 'DM Sans', sans-serif; }
  .header-right { display: flex; align-items: center; gap: 12px; font-size: 0.83rem; color: var(--ink-soft); }
  .badge { background: var(--red-light); color: var(--red); border: 1px solid #f5c5c2; padding: 3px 10px; border-radius: 20px; font-weight: 600; font-size: 0.75rem; }
  .badge.green { background: var(--success-light); color: var(--success); border-color: #a7e8cf; }

  .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }
  .page-title { font-family: 'DM Serif Display', serif; font-size: 1.8rem; margin-bottom: 4px; }
  .page-sub { color: var(--ink-soft); font-size: 0.9rem; margin-bottom: 28px; }

  /* QUEUE LIST */
  .queue-empty { text-align: center; padding: 60px 20px; color: var(--ink-soft); font-size: 0.95rem; }
  .queue-empty .emoji { font-size: 2.5rem; display: block; margin-bottom: 12px; }

  .queue-item {
    background: var(--white); border: 1px solid var(--border); border-radius: 14px;
    margin-bottom: 12px; box-shadow: var(--shadow); overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .queue-item:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .queue-item.sent { opacity: 0.5; border-color: #ccc; }
  .queue-item.skipped { opacity: 0.4; border-color: #ddd; }

  .queue-header {
    display: flex; align-items: center; gap: 14px; padding: 16px 20px;
    cursor: pointer; user-select: none;
  }

  .student-avatar {
    width: 38px; height: 38px; border-radius: 50%; background: var(--red-light);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; color: var(--red); font-size: 0.9rem; flex-shrink: 0;
  }

  .student-info { flex: 1; }
  .student-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 2px; }
  .student-meta { font-size: 0.78rem; color: var(--ink-soft); display: flex; gap: 10px; flex-wrap: wrap; }
  .meta-item { display: flex; align-items: center; gap: 3px; }

  .type-badge {
    padding: 4px 10px; border-radius: 20px; font-size: 0.73rem; font-weight: 600;
    white-space: nowrap; flex-shrink: 0;
  }
  .type-level-up { background: #fdf4e7; border: 1px solid #f5d99b; color: #b57c10; }
  .type-progress  { background: var(--red-light); border: 1px solid #f5c5c2; color: var(--red); }

  .lp-warning {
    display: flex; align-items: center; gap: 5px; font-size: 0.73rem; font-weight: 500;
    color: var(--warning); background: var(--warning-light); border: 1px solid #f5d99b;
    padding: 3px 9px; border-radius: 20px; flex-shrink: 0;
  }

  .expand-icon { color: var(--ink-soft); font-size: 0.8rem; flex-shrink: 0; transition: transform 0.2s; }
  .queue-item.expanded .expand-icon { transform: rotate(180deg); }

  /* EXPANDED PANEL */
  .queue-body { display: none; border-top: 1px solid var(--border); padding: 20px 20px 16px; }
  .queue-item.expanded .queue-body { display: block; }

  /* EMAIL TABS */
  .email-tabs { display: flex; gap: 0; margin-bottom: -1px; }
  .email-tab {
    padding: 9px 18px; font-family: 'DM Sans', sans-serif; font-size: 0.83rem;
    font-weight: 500; cursor: pointer; border: 1px solid var(--border);
    background: var(--cream); color: var(--ink-soft); border-bottom: none;
    border-radius: 9px 9px 0 0; margin-right: 4px; transition: all 0.15s;
  }
  .email-tab.active { background: var(--white); color: var(--ink); }

  .email-panel { display: none; }
  .email-panel.active { display: block; }

  .email-wrapper { border: 1px solid var(--border); border-radius: 0 10px 10px 10px; overflow: hidden; }
  .email-meta-bar { background: #f7f5f2; border-bottom: 1px solid var(--border); padding: 10px 16px; font-size: 0.8rem; color: var(--ink-mid); }
  .email-meta-bar strong { color: var(--ink); }
  .email-subject {
    width: 100%; padding: 9px 16px; border: none; border-bottom: 1px solid var(--border);
    font-family: 'DM Sans', sans-serif; font-size: 0.87rem; font-weight: 500;
    background: var(--white); color: var(--ink); outline: none;
  }
  .email-subject:focus { background: #fffef9; }
  .email-body-ta {
    width: 100%; padding: 16px; border: none; background: var(--white);
    font-family: 'DM Sans', sans-serif; font-size: 0.87rem; color: var(--ink);
    line-height: 1.75; resize: vertical; outline: none; min-height: 180px;
    white-space: pre-wrap;
  }
  .email-body-ta:focus { background: #fffef9; }

  /* ACTIONS */
  .action-bar { display: flex; gap: 8px; margin-top: 14px; align-items: center; flex-wrap: wrap; }
  .btn {
    padding: 9px 16px; border-radius: 9px; font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem; font-weight: 500; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; gap: 6px; border: 1px solid;
  }
  .btn-send  { background: var(--success); color: white; border-color: var(--success); }
  .btn-send:hover { background: #168a5e; }
  .btn-send:disabled { background: #ccc; border-color: #ccc; cursor: not-allowed; }
  .btn-skip  { background: white; color: var(--ink-mid); border-color: var(--border); }
  .btn-skip:hover { border-color: #aaa; }
  .btn-save  { background: white; color: var(--ink-mid); border-color: var(--border); }
  .btn-save:hover { border-color: var(--ink-soft); }

  .send-status { font-size: 0.8rem; font-weight: 500; }
  .send-status.success { color: var(--success); }
  .send-status.error   { color: var(--red); }

  .to-list { font-size: 0.78rem; color: var(--ink-soft); margin-top: 6px; }

  /* LOADING */
  .loading-overlay {
    display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.85);
    z-index: 999; align-items: center; justify-content: center; flex-direction: column; gap: 12px;
  }
  .loading-overlay.active { display: flex; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.75s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    header { padding: 0 16px; }
    .container { padding: 20px 14px 60px; }
    .page-title { font-size: 1.5rem; }
    .queue-header { padding: 14px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-icon">M+</div>Mathnasium</div>
  <div class="header-right">
    <span>Email Review Queue</span>
    <span class="badge" id="pending-badge">Loading…</span>
  </div>
</header>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div style="font-size:0.88rem;color:var(--ink-soft)">Sending email…</div>
</div>

<div class="container">
  <h1 class="page-title">Email Review Queue</h1>
  <p class="page-sub" id="page-sub">Loading pending emails…</p>
  <div id="queue-list"></div>
</div>

<script>
let queueItems = [];

// ── LOAD QUEUE ──
window.addEventListener('load', () => {
  google.script.run
    .withSuccessHandler(renderQueue)
    .withFailureHandler(err => {
      document.getElementById('page-sub').textContent = 'Error loading queue: ' + err.message;
    })
    .getQueueItems();
});

function renderQueue(items) {
  queueItems = items;
  const pending = items.filter(i => i.Status === 'pending' || i.Status === 'error');

  document.getElementById('pending-badge').textContent =
    pending.length ? `${pending.length} pending` : 'All clear';
  document.getElementById('pending-badge').className =
    pending.length ? 'badge' : 'badge green';
  document.getElementById('page-sub').textContent =
    pending.length
      ? `${pending.length} email${pending.length > 1 ? 's' : ''} waiting for your review`
      : 'No emails pending — you\'re all caught up.';

  const list = document.getElementById('queue-list');

  if (pending.length === 0) {
    list.innerHTML = `<div class="queue-empty"><span class="emoji">✅</span>No pending emails. Check back tomorrow!</div>`;
    return;
  }

  list.innerHTML = pending.map((item, idx) => renderQueueItem(item, idx)).join('');
}

function renderQueueItem(item, idx) {
  const initials = (item['First Name'] || item['Student Name'] || '?')[0].toUpperCase();
  const isLevelUp = item['Email Type'] === 'level-up';
  const hasLPWarning = item['LP Status'] !== 'ready';
  const emails = (item['Guardian Emails'] || '').split(',').map(e => e.trim()).filter(Boolean);

  return `
<div class="queue-item" id="item-${idx}">
  <div class="queue-header" onclick="toggleItem(${idx})">
    <div class="student-avatar">${initials}</div>
    <div class="student-info">
      <div class="student-name">${item['Student Name']}</div>
      <div class="student-meta">
        <span class="meta-item">📐 ${item['Assessment Level'] || '—'}</span>
        ${item['Score'] ? `<span class="meta-item">📊 ${item['Score']}</span>` : ''}
        <span class="meta-item">🏫 Grade ${item['Grade']}</span>
        <span class="meta-item">📍 ${item['Center']}</span>
        <span class="meta-item">📅 ${item['Date']}</span>
      </div>
    </div>
    <div class="type-badge ${isLevelUp ? 'type-level-up' : 'type-progress'}">
      ${isLevelUp ? '🎉 Level Up' : '📋 Progress Check'}
    </div>
    ${hasLPWarning ? `<div class="lp-warning">⚠️ LP pending</div>` : ''}
    <div class="expand-icon">▼</div>
  </div>

  <div class="queue-body" id="body-${idx}">
    <div class="to-list">
      <strong>To:</strong> ${emails.join(' · ') || 'No emails found'}
    </div>

    <div class="email-tabs" style="margin-top:14px">
      <button class="email-tab active" id="tab-warm-${idx}" onclick="switchEmailTab(${idx},'warm')">🎉 Celebratory</button>
      <button class="email-tab" id="tab-pro-${idx}" onclick="switchEmailTab(${idx},'pro')">😊 Warm &amp; Straightforward</button>
    </div>

    <!-- WARM VERSION -->
    <div class="email-panel active" id="panel-warm-${idx}">
      <div class="email-wrapper">
        <div class="email-meta-bar"><strong>Subject:</strong></div>
        <input class="email-subject" id="warm-subj-${idx}" value="${escHtml(item['Warm Subject'])}" />
        <textarea class="email-body-ta" id="warm-body-${idx}" rows="12">${escHtml(item['Warm Body'])}</textarea>
      </div>
      <div class="action-bar">
        <button class="btn btn-send" onclick="sendEmail(${idx}, 'warm')" ${emails.length === 0 ? 'disabled' : ''}>
          ✉️ Send This Version
        </button>
        <button class="btn btn-save" onclick="saveEdits(${idx})">💾 Save Edits</button>
        <button class="btn btn-skip" onclick="skipEmail(${idx})">✕ Skip</button>
        <span class="send-status" id="status-${idx}"></span>
      </div>
    </div>

    <!-- PRO VERSION -->
    <div class="email-panel" id="panel-pro-${idx}">
      <div class="email-wrapper">
        <div class="email-meta-bar"><strong>Subject:</strong></div>
        <input class="email-subject" id="pro-subj-${idx}" value="${escHtml(item['Pro Subject'])}" />
        <textarea class="email-body-ta" id="pro-body-${idx}" rows="12">${escHtml(item['Pro Body'])}</textarea>
      </div>
      <div class="action-bar">
        <button class="btn btn-send" onclick="sendEmail(${idx}, 'pro')" ${emails.length === 0 ? 'disabled' : ''}>
          ✉️ Send This Version
        </button>
        <button class="btn btn-save" onclick="saveEdits(${idx})">💾 Save Edits</button>
        <button class="btn btn-skip" onclick="skipEmail(${idx})">✕ Skip</button>
        <span class="send-status" id="status-pro-${idx}"></span>
      </div>
    </div>
  </div>
</div>`;
}

// ── TOGGLE EXPAND ──
function toggleItem(idx) {
  const el = document.getElementById(`item-${idx}`);
  el.classList.toggle('expanded');
  // Auto-expand first item
}

// ── SWITCH EMAIL TAB ──
function switchEmailTab(idx, version) {
  ['warm','pro'].forEach(v => {
    document.getElementById(`tab-${v}-${idx}`).classList.toggle('active', v === version);
    document.getElementById(`panel-${v}-${idx}`).classList.toggle('active', v === version);
  });
}

// ── SEND EMAIL ──
function sendEmail(idx, version) {
  const item = queueItems.filter(i => i.Status === 'pending' || i.Status === 'error')[idx];
  if (!item) return;

  const subject = document.getElementById(`${version}-subj-${idx}`).value;
  const body    = document.getElementById(`${version}-body-${idx}`).value;
  const statusEl = document.getElementById(`status-${version === 'warm' ? '' : version + '-'}${idx}`);

  if (!confirm(`Send email to ${item['Guardian Emails']}?\n\nSubject: ${subject}`)) return;

  document.getElementById('loading-overlay').classList.add('active');

  google.script.run
    .withSuccessHandler(result => {
      document.getElementById('loading-overlay').classList.remove('active');
      document.getElementById(`item-${idx}`).classList.add('sent');
      document.getElementById(`item-${idx}`).classList.remove('expanded');
      statusEl.textContent = `✓ Sent to ${result.sentTo.join(', ')}`;
      statusEl.className = 'send-status success';
      updatePendingCount();
    })
    .withFailureHandler(err => {
      document.getElementById('loading-overlay').classList.remove('active');
      statusEl.textContent = '✗ ' + err.message;
      statusEl.className = 'send-status error';
    })
    .sendApprovedEmail(item._rowIndex, version, subject, body);
}

// ── SAVE EDITS ──
function saveEdits(idx) {
  const item = queueItems.filter(i => i.Status === 'pending' || i.Status === 'error')[idx];
  if (!item) return;

  google.script.run
    .withSuccessHandler(() => {
      const statusEl = document.getElementById(`status-${idx}`);
      if (statusEl) { statusEl.textContent = '✓ Saved'; statusEl.className = 'send-status success'; }
    })
    .saveEdits(
      item._rowIndex,
      document.getElementById(`warm-subj-${idx}`).value,
      document.getElementById(`warm-body-${idx}`).value,
      document.getElementById(`pro-subj-${idx}`).value,
      document.getElementById(`pro-body-${idx}`).value
    );
}

// ── SKIP ──
function skipEmail(idx) {
  const item = queueItems.filter(i => i.Status === 'pending' || i.Status === 'error')[idx];
  if (!item) return;

  const reason = prompt('Reason for skipping (optional):');
  if (reason === null) return; // cancelled

  google.script.run
    .withSuccessHandler(() => {
      document.getElementById(`item-${idx}`).classList.add('skipped');
      document.getElementById(`item-${idx}`).classList.remove('expanded');
      updatePendingCount();
    })
    .skipEmail(item._rowIndex, reason);
}

// ── UPDATE BADGE ──
function updatePendingCount() {
  const pending = document.querySelectorAll('.queue-item:not(.sent):not(.skipped)').length;
  document.getElementById('pending-badge').textContent = pending ? `${pending} pending` : 'All clear';
  document.getElementById('pending-badge').className   = pending ? 'badge' : 'badge green';
}

// ── HELPERS ──
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Auto-expand first item on load
window.addEventListener('load', () => {
  setTimeout(() => {
    const first = document.getElementById('item-0');
    if (first) first.classList.add('expanded');
  }, 500);
});
</script>
</body>
</html>
